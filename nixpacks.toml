[variables]
NIXPACKS_NODE_VERSION = "22"
NODE_VERSION = "22.14.0"

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm-9_x"]

[phases.install]
cmds = ["rm -f pnpm-lock.yaml", "pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @workspace/api-server run build", "pnpm --filter @workspace/db run push"]
