[variables]
NIXPACKS_NODE_VERSION = "22"
NODE_VERSION = "22.14.0"

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
dependsOn = ["setup"]
cmds = ["rm -f pnpm-lock.yaml", "pnpm install --no-frozen-lockfile"]

[phases.build]
dependsOn = ["install"]
cmds = ["pnpm --filter @workspace/api-server run build"]
