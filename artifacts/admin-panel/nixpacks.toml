# Railway Root Directory = artifacts/admin-panel
# Railway clones the full repo, then sets CWD to this subfolder.
# We need to go back to repo root for pnpm workspace install.

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
cmds = [
  "cd ../.. && rm -f pnpm-lock.yaml && pnpm install --no-frozen-lockfile --ignore-scripts"
]

[phases.build]
cmds = ["cd ../.. && pnpm --filter @workspace/admin-panel run build"]

[start]
cmd = "node server.mjs"
