[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
dependsOn = ["setup"]
cmds = [
  "rm -f pnpm-lock.yaml && pnpm install --no-frozen-lockfile --ignore-scripts"
]

[phases.build]
dependsOn = ["install"]
cmds = ["pnpm --filter @workspace/admin-panel run build"]

[start]
cmd = "cd artifacts/admin-panel && node server.mjs"

