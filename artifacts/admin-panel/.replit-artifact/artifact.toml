kind = "web"
previewPath = "/"
title = "Admin Panel - Bot Jualan"
version = "1.0.0"
id = "artifacts/admin-panel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20130
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/admin-panel run dev"

[services.env]
PORT = "20130"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/admin-panel", "run", "build"]
publicDir = "artifacts/admin-panel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
